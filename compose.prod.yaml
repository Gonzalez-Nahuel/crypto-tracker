services:
  migrate:
    image: ghcr.io/${GITHUB_OWNER}/crypto-tracker:${IMAGE_TAG}
    container_name: crypto-tracker-migrate
    env_file:
      - .env
    depends_on:
      db:
        condition: "service_healthy"
    command: npx prisma migrate deploy
  app:
    image: ghcr.io/${GITHUB_OWNER}/crypto-tracker:${IMAGE_TAG}
    container_name: crypto_tracker
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: "service_healthy"
  db:
    image: postgres:17
    container_name: postgresdb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cryptotrackerdb
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
