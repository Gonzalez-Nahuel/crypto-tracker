name: CI

on:
  push:
    branches:
      - feature/docker-aws

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Dev

    env:
      DATABASE_URL: ${{secrets.DATABASE_URL}}
      DIRECT_URL: ${{secrets.DIRECT_URL}}
      NEWS_API_KEY: ${{secrets.NEWS_API_KEY}}
      ACCESS_SECRET: ${{secrets.ACCESS_SECRET}}
      REFRESH_SECRET: ${{secrets.REFRESH_SECRET}}
      ACCESS_TOKEN_EXPIRES: ${{secrets.ACCESS_TOKEN_EXPIRES}}
      REFRESH_TOKEN_EXPIRES: ${{secrets.REFRESH_TOKEN_EXPIRES}}
      RESEND_API_KEY: ${{secrets.RESEND_API_KEY}}
      APP_URL: ${{secrets.APP_URL}}

    services:
      postgres:
        image: postgres:17

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.jobs
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Build aplication
        run: npm run build

      #- name: Login GHCR
      # run: echo "${{secrets.GITHUB_TOKEN}}" | docker login ghcr.io -u ${{github.actor}} --password-stdin

      #- name: Build docker image
      #  run: docker build -f Dockerfile.prod -t ghcr.io/${{github.repository_owner}}/crypto-tracker:${{github.sha}}

      # - name: Push image
      #   run: docker push ghcr.io/${{github.repository_owner}}/crypto-tracker:${{github.sha}}*/}
